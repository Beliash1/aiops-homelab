# CI half of the pipeline. Runs on GitHub's cloud runners, which cannot
# reach your laptop's kind cluster -- so this workflow's job ends at
# "commit the new image tag." Argo CD, running inside the cluster (see
# k8s/gitops/argocd-app.yaml), is what actually deploys it. That split is
# deliberate GitOps design, not a limitation: see docs/ARCHITECTURE.md.
name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: write   # to commit the image-tag bump back to the repo
  packages: write    # to push to GitHub Container Registry (GHCR)

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        working-directory: app
        run: pytest -v

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      # GHCR (and OCI registries generally) require the repository name to be
      # all lowercase, but a GitHub username/org can contain uppercase letters
      # (e.g. "Beliash1") -- so github.repository can't be used as-is in a tag.
      - name: Compute image tag and lowercase image name
        id: meta
        run: |
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "image=$(echo '${{ env.REGISTRY }}/${{ github.repository }}/aiops-app' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.5.0
          curl -fsSL -o kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          rm -f kustomize.tar.gz
          kustomize version

      - name: Bump image tag in k8s manifests
        working-directory: k8s/base
        run: |
          kustomize edit set image aiops-app=${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes -- image tag unchanged, skipping commit."
            exit 0
          fi
          git commit -m "ci: deploy ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push
      # Argo CD (running in-cluster) detects this commit and syncs the
      # Rollout automatically -- see k8s/gitops/argocd-app.yaml. That sync
      # is what triggers the canary/AnalysisTemplate/auto-rollback sequence
      # described in k8s/base/rollout.yaml.
