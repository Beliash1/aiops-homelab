apiVersion: v1
kind: Service
metadata:
  name: aiops-app
  namespace: aiops-homelab
  labels:
    app: aiops-app
spec:
  selector:
    app: aiops-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort
---
# Argo Rollouts needs a stable + canary service pair for traffic-shaped
# canaries and for the AnalysisTemplate above to query the canary pods
# specifically, separate from the stable ones.
apiVersion: v1
kind: Service
metadata:
  name: aiops-app-canary
  namespace: aiops-homelab
  labels:
    app: aiops-app
spec:
  selector:
    app: aiops-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
